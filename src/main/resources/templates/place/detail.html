<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title" th:text="${place.placeTitle} + ' | Spotick'"></title>
    <link rel="stylesheet" th:href="@{/dist/css/place/detail.min.css}">
</head>

<div layout:fragment="content">
    <input type="hidden" id="placeId" th:value="${place.placeId}">
    <input type="hidden" id="placeLat" th:value="${place.placeLat}">
    <input type="hidden" id="placeLng" th:value="${place.placeLng}">
    <input type="hidden" id="placePrice" th:value="${place.placePrice}">
    <input type="hidden" id="placeSurcharge" th:value="${place.placeSurcharge}">
    <input type="hidden" id="placeDefaultPeople" th:value="${place.placeDefaultPeople}">

    <main class="pd-container">
        <section class="pd-gallery">
            <div class="pd-gallery__main" id="galleryMainBtn" data-idx="0">
                <img th:src="@{/file/display(fileName=${place.placeFileList[0].uploadPath + '/' + place.placeFileList[0].uuid + '_' + place.placeFileList[0].fileName})}"
                     alt="메인 사진">
            </div>
            <div class="pd-gallery__sub">
                <div th:each="i : ${#numbers.sequence(1, 4)}" th:if="${place.placeFileList.size() > i}"
                     class="pd-gallery__item" th:data-idx="${i}">
                    <img th:src="@{/file/display(fileName=${place.placeFileList[i].uploadPath + '/' + place.placeFileList[i].uuid + '_' + place.placeFileList[i].fileName})}"
                         alt="서브 사진">
                </div>
            </div>
            <button class="pd-gallery__more" th:if="${place.placeFileList.size() > 5}" type="button">
                + <span th:text="${place.placeFileList.size() - 5}"></span>
            </button>
        </section>

        <div class="pd-layout">
            <article class="pd-content">
                <header class="pd-header">
                    <p class="pd-header__subtitle" th:text="${place.placeSubTitle}"></p>
                    <div class="pd-header__title-box">
                        <h1 class="pd-header__title" th:text="${place.placeTitle}"></h1>
                        <button class="pd-bookmark" id="bookmarkBtn" type="button"
                                th:data-checked="${place.bookmarkChecked}">
                            <i th:class="${place.bookmarkChecked ? 'fa-solid fa-bookmark pd-bookmark--on' : 'fa-regular fa-bookmark'}"></i>
                        </button>
                    </div>
                    <div class="pd-header__address">
                        <i class="fa-solid fa-location-dot"></i>
                        <span th:text="${place.placeAddress + ' ' + place.placeAddressDetail}"></span>
                    </div>
                    <div class="pd-header__stats">
                        <i class="fa-solid fa-star" style="color:#ffd600;"></i>
                        <span th:text="${place.evalAvg} + ' (' + ${place.evalCount} + ')'"></span>
                    </div>
                </header>

                <nav class="pd-nav" id="pdNav">
                    <button class="pd-nav__item active" data-target="section-info">장소 소개</button>
                    <button class="pd-nav__item" data-target="section-rule">이용 규칙</button>
                    <button class="pd-nav__item" data-target="section-review">리뷰 (<span
                            th:text="${place.evalCount}"></span>)
                    </button>
                    <button class="pd-nav__item" data-target="section-inquiry">문의 (<span id="navInquiryCount"
                                                                                         th:text="${place.inquiryCount}"></span>)
                    </button>
                </nav>

                <section class="pd-section" id="section-info">
                    <h2 class="pd-section__title">장소 소개</h2>
                    <p class="pd-section__text" th:text="${place.placeInfo}"></p>
                    <div class="pd-map" id="map"></div>
                </section>

                <section class="pd-section" id="section-rule">
                    <h2 class="pd-section__title">이용 규칙</h2>
                    <p class="pd-section__text" th:text="${place.placeRule}"></p>
                </section>

                <section class="pd-section" id="section-review">
                    <h2 class="pd-section__title">후기 <span th:text="${place.evalCount}"></span></h2>
                    <div id="reviewList" class="pd-list"></div>
                </section>

                <section class="pd-section" id="section-inquiry">
                    <div class="pd-section__header">
                        <h2 class="pd-section__title">문의 <span id="titleInquiryCount"
                                                               th:text="${place.inquiryCount}"></span></h2>
                        <button class="pd-btn pd-btn--outline" id="inquiryOpenBtn" type="button">문의하기</button>
                    </div>
                    <div id="inquiryList" class="pd-list"></div>
                </section>
            </article>

            <aside class="pd-sidebar">
                <div class="pd-reserve">
                    <h3 class="pd-reserve__title" th:text="${place.placeTitle}"></h3>
                    <div class="pd-reserve__price">
                        <strong th:text="${#numbers.formatInteger(place.placePrice, 1, 'COMMA')} + '원'"></strong> / 시간
                    </div>

                    <div class="pd-reserve__group">
                        <p class="pd-reserve__label">스케줄</p>
                        <button class="pd-reserve__input-btn" id="scheduleBtn" type="button">스케줄을 선택하세요</button>

                        <div class="pd-popup" id="schedulePopup">
                            <div class="pd-popup__cal-wrapper" id="flatpickrWrapper">
                                <input type="hidden" id="datePicker">
                            </div>

                            <div class="pd-popup__time-header">
                                <p id="scheduleTimeText" class="pd-time-text">날짜를 먼저 선택해주세요</p>
                            </div>
                            <div class="pd-time-grid" id="timeGrid">
                            </div>

                            <button class="pd-btn pd-btn--black" id="scheduleConfirmBtn" type="button">완료</button>
                        </div>
                    </div>

                    <div class="pd-reserve__group">
                        <p class="pd-reserve__label">총 인원 <span style="font-weight:400; font-size:12px; color:#8a8a8e;"
                                                                th:text="'(기본 ' + ${place.placeDefaultPeople} + '명)'"></span>
                        </p>
                        <button class="pd-reserve__input-btn" id="peopleBtn" type="button">총 인원 수를 입력하세요</button>

                        <div class="pd-popup" id="peoplePopup">
                            <div class="pd-popup__counter">
                                <button class="pd-counter-btn" id="peopleMinus" type="button">-</button>
                                <input type="number" id="peopleCount" value="1" readonly>
                                <button class="pd-counter-btn" id="peoplePlus" type="button">+</button>
                            </div>
                            <button class="pd-btn pd-btn--black" id="peopleConfirmBtn" type="button">완료</button>
                        </div>
                    </div>

                    <div id="calcResultBox" class="pd-calc-box"></div>

                    <form id="reservationForm" method="post" th:action="@{/place/reserve/register}">
                        <input name="placeId" th:value="${place.placeId}" type="hidden">
                        <input id="formCheckIn" name="reservationCheckIn" type="hidden">
                        <input id="formCheckOut" name="reservationCheckOut" type="hidden">
                        <input id="formVisitors" name="visitors" type="hidden">
                        <button class="pd-btn pd-btn--submit" id="submitBtn" type="button" disabled>예약 요청하기</button>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <div class="pd-modal" id="inquiryModal">
        <div class="pd-modal__box">
            <button class="pd-modal__close" id="inquiryCloseBtn" type="button"><i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="pd-modal__title">호스트에게 문의하기</h3>
            <input type="text" class="pd-modal__input" id="inquiryTitle" placeholder="문의 제목">
            <div style="position:relative; margin-bottom: 24px;">
                <textarea class="pd-modal__textarea" id="inquiryContent" rows="6" placeholder="문의 내용"></textarea>
                <div class="pd-modal__counter"><span id="inquiryLength">0</span>/200자</div>
            </div>
            <button class="pd-btn pd-btn--submit" id="inquirySubmitBtn" type="button" disabled>등록하기</button>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script type="text/javascript"
            th:src="|//dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoJsKey}&libraries=services&autoload=false|"></script>
    <script th:src="@{/dist/js/place/detail.min.js}" type="module"></script>
</th:block>
</html>
