<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title" th:text="'Spotick | ' + ${promotion.title}"></title>
    <link rel="stylesheet" th:href="@{/dist/css/promotion/detail.min.css}">
</head>
<body>

<main layout:fragment="content" class="pd-page">
    <input type="hidden" id="isLoggedIn" th:value="${#authorization.expression('isAuthenticated()')}">
    <input type="hidden" id="promotionId" th:value="${promotion.promotionId}">
    <input type="hidden" id="userId" th:value="${promotion.userId}">

    <article class="pd-detail" th:object="${promotion}">
        <div class="pd-hero">
            <img class="pd-hero__img" th:alt="*{thumbnailImage.fileName}"
                 th:src="|/file/display?fileName=*{thumbnailImage.uploadPath}/*{thumbnailImage.uuid}_*{thumbnailImage.fileName}|">
        </div>

        <div class="pd-layout">
            <aside class="pd-sidebar">
                <div class="pd-action">
                    <button type="button" class="pd-action__btn pd-action__btn--like" id="likeBtn" th:data-status="*{isLiked}">
                        <i th:class="*{isLiked ? 'fa-solid fa-heart' : 'fa-regular fa-heart'}"></i>
                    </button>
                    <span class="pd-action__count" id="likeCount" th:text="*{likeCount}">0</span>
                </div>
                <div class="pd-action">
                    <button type="button" class="pd-action__btn pd-action__btn--share" id="shareBtn">
                        <i class="fa-solid fa-share-nodes"></i>
                    </button>
                </div>
            </aside>

            <div class="pd-main">
                <header class="pd-header">
                    <h1 class="pd-header__title" th:text="*{title}"></h1>
                    <div class="pd-header__meta">
                        <span class="pd-badge" th:text="*{category.displayName}"></span>
                        <span class="pd-date" th:text="*{#temporals.format(createdDate, 'yyyy.MM.dd HH:mm')}"></span>
                    </div>

                    <div class="pd-header__author-row">
                        <div class="pd-author">
                            <img class="pd-author__img" th:if="*{userProfileImage.uuid != null}"
                                 th:src="|/file/display?fileName=*{userProfileImage.uploadPath}/*{userProfileImage.uuid}_*{userProfileImage.fileName}|" th:alt="*{nickName}">
                            <img class="pd-author__img" th:unless="*{userProfileImage.uuid != null}"
                                 th:src="@{/imgs/default/{fileName}(fileName=*{userProfileImage.fileName})}" th:alt="*{nickName}">
                            <span class="pd-author__name" th:text="*{nickName}"></span>
                        </div>

                        <div class="pd-controls" sec:authorize="isAuthenticated()" th:if="${#authentication.principal.id == promotion.userId}">
                            <a class="pd-btn pd-btn--edit" th:href="@{/promotion/{id}/edit(id=*{promotionId})}">수정하기</a>
                            <button type="button" class="pd-btn pd-btn--delete" id="deleteBtn">삭제하기</button>
                        </div>
                    </div>

                    <p class="pd-header__sub" th:if="*{subTitle != null}" th:text="*{subTitle}"></p>
                </header>

                <hr class="pd-divider">

                <div class="pd-content ql-editor" th:utext="*{content}"></div>
            </div>
        </div>
    </article>

    <section class="pd-more">
        <h3 class="pd-more__title">이 호스트의 다른 컨텐츠</h3>
        <div class="pd-slider">
            <div class="pd-slider__track" id="moreContentsTrack">
            </div>
        </div>
        <div id="loadingSpinner" class="pd-loading" style="display: none;">
            <img src="/imgs/loading.svg" alt="로딩 중">
        </div>
        <div id="scrollTarget" style="height: 20px; width: 100%;"></div>
    </section>
</main>

<th:block layout:fragment="script">
    <script type="module" th:src="@{/dist/js/promotion/detail.min.js}"></script>
</th:block>
</body>
</html>
