<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title">Spotick | 홍보 게시판</title>
    <link rel="stylesheet" th:href="@{/dist/css/promotion/list.min.css}">
</head>

<div layout:fragment="content">
    <main class="pro-page">

        <section class="pro-recommend">
            <h2 class="pro-recommend__title">주목할 만한 컨텐츠</h2>
            <div class="pro-slider" id="recommendSlider">
                <div class="pro-slider__track">
                    <a class="pro-slider__item" th:each="recommend : ${data.recommendations}"
                       th:href="@{/promotion/{id}(id=${recommend.promotionId})}">
                        <img class="pro-slider__img" th:alt="${recommend.title}"
                             th:src="|/file/display?fileName=${recommend.thumbnailImage.uploadPath}/${recommend.thumbnailImage.uuid}_${recommend.thumbnailImage.fileName}|">
                        <div class="pro-slider__info">
                            <h3 class="pro-title" th:text="${recommend.title}"></h3>
                            <p class="pro-desc" th:text="${recommend.subTitle}"></p>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <section class="pro-toolbar">
            <div class="pro-search">
                <i class="fa-solid fa-magnifying-glass pro-search__icon"></i>
                <input type="text" id="searchInput" class="pro-search__input" placeholder="검색어를 입력해주세요.">
            </div>

            <div class="pro-controls">
                <div class="pro-category" id="categorySlider">
                    <div class="pro-category__track">
                        <button type="button" class="pro-category__btn pro-category__btn--active" data-category="ALL">전체</button>
                        <button type="button" class="pro-category__btn"
                                th:each="category : ${T(com.app.spotick.domain.type.promotion.PromotionCategory).values()}"
                                th:data-category="${category.name()}" th:text="${category.displayName}"></button>
                    </div>
                </div>

                <div class="pro-sort" id="sortBox">
                    <button class="pro-sort__btn" type="button">
                        <span class="pro-sort__text">최신순</span>
                        <input id="sortInput" type="hidden" value="NEWEST">
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="pro-sort__list">
                        <button class="pro-sort__item pro-sort__item--active" data-sort="NEWEST" type="button">최신순</button>
                        <button class="pro-sort__item" data-sort="POPULARITY" type="button">인기순</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="pro-grid" id="promotionGrid"></section>

        <div class="pro-loading" id="loadingSpinner">
            <img alt="로딩" src="/imgs/loading.svg">
        </div>

        <div id="scrollTarget" style="height: 10px; width: 100%;"></div>

        <a class="pro-fab" th:href="@{/promotion/register}">
            <i class="fa-solid fa-pen"></i>
        </a>
    </main>
</div>

<th:block layout:fragment="script">
    <script th:src="@{/dist/js/promotion/list.min.js}" type="module"></script>
</th:block>
</html>
