<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotick | 길을 잃으셨나요?</title>
    <link rel="icon" th:href="@{/imgs/logo/favicon.png}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .err-wrap {
            text-align: center;
            padding: 20px;
        }

        .err-code {
            font-size: clamp(120px, 20vw, 240px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #f4f5f7;
            position: relative;
            z-index: -1;
            margin-bottom: -40px;
        }

        .err-title {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .err-desc {
            font-size: 18px;
            color: #636366;
            line-height: 1.6;
            margin-bottom: 48px;
        }

        .err-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .err-btn {
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .err-btn--primary {
            background-color: #1c1c1e;
            color: #ffffff;
        }

        .err-btn--primary:hover {
            background-color: #3a3a3c;
            transform: translateY(-2px);
        }

        .err-btn--outline {
            border-color: #dfe2e7;
            color: #1c1c1e;
        }

        .err-btn--outline:hover {
            background-color: #f4f5f7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="err-wrap">
    <div class="err-code">404</div>
    <h1 class="err-title">페이지를 찾을 수 없습니다.</h1>
    <p class="err-desc">요청하신 페이지가 사라졌거나, <br>잘못된 경로로 접근하신 것 같습니다.</p>
    <div class="err-actions">
        <a sec:authorize="!isAuthenticated()" href="/user/login" class="err-btn err-btn--outline">로그인</a>
        <a href="/" class="err-btn err-btn--primary">메인으로 이동</a>
    </div>
</div>
</body>
</html>
