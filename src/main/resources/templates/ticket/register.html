<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title" th:text="${ticketEditDto != null ? 'Spotick | 티켓팅 수정' : 'Spotick | 티켓팅 등록'}"></title>
    <link rel="stylesheet" th:href="@{/dist/css/ticket/register.min.css}">
</head>
<body>

<main class="layout-wrapper__main" layout:fragment="content">
    <div class="tk-register" th:with="isEdit=${ticketEditDto != null}">
        <div class="tk-register__header">
            <h1 class="tk-register__title" th:text="${isEdit ? '티켓팅 정보 수정' : '티켓팅 등록 신청'}"></h1>
            <p class="tk-register__subtitle">티켓팅 신청 및 수정은 시작일로부터 최소 일주일 전까지만 가능합니다. 특정 필드는 신청 후 수정이 불가할 수 있습니다.</p>
        </div>

        <form th:if="${!isEdit}" class="tk-form" enctype="multipart/form-data" method="post"
              th:action="@{/ticket/register}" th:object="${ticketRegisterDto}">
            <th:block th:replace="~{::form-fields(isEdit=false)}"></th:block>
        </form>

        <form th:if="${isEdit}" class="tk-form" enctype="multipart/form-data" method="post"
              th:action="@{/ticket/edit/{id}(id=*{ticketId})}" th:object="${ticketEditDto}">
            <th:block th:replace="~{::form-fields(isEdit=true)}"></th:block>
        </form>
    </div>
</main>

<th:block th:fragment="form-fields(isEdit)">
    <section class="tk-section">
        <h2 class="tk-section__title">1. 기본 정보</h2>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">티켓팅 이름 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>
            <input type="text" class="tk-input" placeholder="행사를 대표하는 이름을 입력해 주세요" required th:field="*{title}">
        </div>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">행사 설명 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>
            <textarea class="tk-textarea" placeholder="행사에 대해서 자세하게 설명해주세요" required th:field="*{content}"></textarea>
        </div>

        <div class="tk-field__row">
            <div class="tk-field tk-field--half">
                <div class="tk-field__label-group">
                    <label class="tk-field__label">관람 연령 <span class="tk-field__required">*</span></label>
                </div>
                <select class="tk-select" th:field="*{ticketRatingType}">
                    <option th:each="enumValue : ${T(com.app.spotick.domain.type.ticket.TicketRatingType).values()}"
                            th:text="${enumValue.displayName}" th:value="${enumValue}"></option>
                </select>
            </div>
            <div class="tk-field tk-field--half">
                <div class="tk-field__label-group">
                    <label class="tk-field__label">행사 카테고리 <span class="tk-field__required">*</span></label>
                </div>
                <select class="tk-select" th:field="*{category}">
                    <option th:each="enumValue : ${T(com.app.spotick.domain.type.ticket.TicketCategory).values()}"
                            th:text="${enumValue.displayName}" th:value="${enumValue}"></option>
                </select>
            </div>
        </div>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">행사 기간 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></p>
            </div>
            <div class="tk-date">
                <input type="text" class="tk-input tk-date__input" id="eventDates" placeholder="행사 시작일 ~ 종료일을 선택하세요"
                       readonly>
                <input type="hidden" th:field="*{startDate}" id="startDate">
                <input type="hidden" th:field="*{endDate}" id="endDate">
            </div>
        </div>
    </section>

    <section class="tk-section">
        <h2 class="tk-section__title">2. 위치 및 사진</h2>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">위치 검색 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('placeLat')}" th:errors="*{placeLat}"></p>
            </div>
            <div class="tk-map-box">
                <div class="tk-map-box__search">
                    <input id="search" class="tk-input" placeholder="장소를 검색해주세요" type="text">
                    <button class="tk-map-box__btn" type="button" id="mapSearchBtn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <div id="map" class="tk-map-box__view"></div>
                <input id="placeLat" name="placeLat" th:field="*{placeLat}" type="hidden">
                <input id="placeLng" name="placeLng" th:field="*{placeLng}" type="hidden">
            </div>
        </div>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">상세 주소 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('placeAddressDetail')}"
                   th:errors="*{placeAddressDetail}"></p>
            </div>
            <input class="tk-input tk-input--mb" id="placeAddress" name="placeAddress"
                   placeholder="지도에서 핀을 클릭하면 주소가 입력됩니다" readonly required th:field="*{placeAddress}" type="text">
            <input class="tk-input" name="placeAddressDetail" placeholder="상세 주소를 입력해 주세요" required
                   th:field="*{placeAddressDetail}" type="text">
        </div>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">대표 사진 <span class="tk-field__required">*</span></label>
                <th:block th:if="${!isEdit}">
                    <p class="tk-field__error" th:if="${#fields.hasErrors('ticketFile')}" th:errors="*{ticketFile}"></p>
                </th:block>
                <th:block th:if="${isEdit}">
                    <p class="tk-field__error" th:if="${#fields.hasErrors('newTicketFile')}" th:errors="*{newTicketFile}"></p>
                    <input type="hidden" th:field="*{ticketFileId}">
                    <input type="hidden" th:field="*{uploadPath}">
                    <input type="hidden" th:field="*{uuid}">
                    <input type="hidden" th:field="*{fileName}">
                </th:block>
            </div>
            <div class="tk-image">
                <input accept="image/*" type="file" th:id="${isEdit ? 'newTicketFile' : 'ticketFile'}"
                       th:name="${isEdit ? 'newTicketFile' : 'ticketFile'}" hidden>

                <label class="tk-image__label" th:for="${isEdit ? 'newTicketFile' : 'ticketFile'}" id="uploadLabel"
                       th:style="${isEdit and ticketEditDto?.uploadPath != null ? 'display: none;' : ''}">
                    <i class="fa-regular fa-image"></i> 클릭하여 대표 사진 업로드
                </label>

                <div class="tk-image__preview" id="imagePreview"
                     th:style="${isEdit and ticketEditDto?.uploadPath != null ? 'display: block;' : 'display: none;'}">
                    <img th:if="${isEdit and ticketEditDto?.uploadPath != null}"
                         th:src="|/file/display?fileName=*{uploadPath}/t_*{uuid}_*{fileName}|"
                         alt="미리보기" class="tk-image__img" id="previewImg">
                    <img th:unless="${isEdit and ticketEditDto?.uploadPath != null}" src="" alt="미리보기" class="tk-image__img" id="previewImg">
                    <button type="button" class="tk-image__delete" id="deleteImgBtn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
        </div>
    </section>

    <section class="tk-section">
        <h2 class="tk-section__title">3. 등급 및 요금</h2>

        <div class="tk-grade">
            <div class="tk-grade__list" id="gradeList">

                <th:block th:if="${!isEdit or #lists.isEmpty(ticketEditDto?.ticketGrades)}">
                    <div class="tk-grade__item">
                        <input class="tk-input tk-grade__name" name="ticketGrades[0].gradeName" placeholder="등급명 (예: VIP)" required type="text">
                        <div class="tk-grade__input-box">
                            <input class="tk-input tk-grade__price" name="ticketGrades[0].price" placeholder="금액" required type="number" min="0">
                            <span class="tk-grade__unit">원</span>
                        </div>
                        <div class="tk-grade__input-box">
                            <input class="tk-input tk-grade__people" name="ticketGrades[0].maxPeople" placeholder="최대 인원" required type="number" min="1">
                            <span class="tk-grade__unit">명</span>
                        </div>
                        <button type="button" class="tk-grade__remove-btn" style="display: none;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </th:block>

                <th:block th:if="${isEdit and not #lists.isEmpty(ticketEditDto?.ticketGrades)}">
                    <div class="tk-grade__item" th:each="grade, iterStat : ${ticketEditDto.ticketGrades}">
                        <input class="tk-input tk-grade__name" th:name="'ticketGrades[' + ${iterStat.index} + '].gradeName'"
                               th:value="${grade.gradeName}" placeholder="등급명 (예: VIP)" required type="text" readonly>
                        <div class="tk-grade__input-box">
                            <input class="tk-input tk-grade__price" th:name="'ticketGrades[' + ${iterStat.index} + '].price'"
                                   th:value="${grade.price}" placeholder="금액" required type="number" min="0" readonly>
                            <span class="tk-grade__unit">원</span>
                        </div>
                        <div class="tk-grade__input-box">
                            <input class="tk-input tk-grade__people" th:name="'ticketGrades[' + ${iterStat.index} + '].maxPeople'"
                                   th:value="${grade.maxPeople}" placeholder="최대 인원" required type="number" min="1" readonly>
                            <span class="tk-grade__unit">명</span>
                        </div>
                    </div>
                </th:block>

            </div>
            <button th:if="${!isEdit}" class="tk-grade__add-btn" id="addGradeBtn" type="button" disabled><i class="fa-solid fa-plus"></i> 등급 추가하기</button>
        </div>
    </section>

    <section class="tk-section">
        <h2 class="tk-section__title">4. 정산 정보</h2>

        <div class="tk-field__row">
            <div class="tk-field tk-field--half">
                <div class="tk-field__label-group">
                    <label class="tk-field__label">예금주 <span class="tk-field__required">*</span></label>
                    <p class="tk-field__error" th:if="${#fields.hasErrors('accountHolder')}" th:errors="*{accountHolder}"></p>
                </div>
                <input class="tk-input" placeholder="예금주 성명" required th:field="*{accountHolder}" type="text">
            </div>
            <div class="tk-field tk-field--half">
                <div class="tk-field__label-group">
                    <label class="tk-field__label">은행명 <span class="tk-field__required">*</span></label>
                </div>
                <select class="tk-select" th:field="*{bankName}">
                    <option value="국민">국민은행</option>
                    <option value="신한">신한은행</option>
                    <option value="우리">우리은행</option>
                    <option value="농협">농협은행</option>
                    <option value="카카오뱅크">카카오뱅크</option>
                </select>
            </div>
        </div>

        <div class="tk-field">
            <div class="tk-field__label-group">
                <label class="tk-field__label">계좌번호 <span class="tk-field__required">*</span></label>
                <p class="tk-field__error" th:if="${#fields.hasErrors('accountNumber')}" th:errors="*{accountNumber}"></p>
            </div>
            <input class="tk-input" placeholder="'-' 제외 입력" required th:field="*{accountNumber}" type="text">
        </div>
    </section>

    <div class="tk-actions">
        <a th:href="@{/mypage/tickets}" class="tk-actions__btn tk-actions__btn--cancel">취소</a>
        <button type="submit" class="tk-actions__btn tk-actions__btn--submit"
                th:text="${isEdit ? '수정 완료' : '신청하기'}"></button>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script type="text/javascript"
            th:src="|//dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoJsKey}&libraries=services&autoload=false|"></script>
    <script type="module" th:src="@{/dist/js/ticket/register.min.js}"></script>
</th:block>
</body>
</html>
