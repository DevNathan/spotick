<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title" th:text="${ticketDetail.title} + ' | Spotick'"></title>
    <link rel="stylesheet" th:href="@{/dist/css/ticket/detail.min.css}">
</head>

<div layout:fragment="content">
    <input type="hidden" id="ticketId" th:value="${ticketDetail.ticketId}">
    <input type="hidden" id="ticketLat" th:value="${ticketDetail.lat}">
    <input type="hidden" id="ticketLng" th:value="${ticketDetail.lng}">
    <input type="hidden" id="startDate" th:value="${ticketDetail.startDate}">
    <input type="hidden" id="endDate" th:value="${ticketDetail.endDate}">

    <main class="td-container">
        <div class="td-main">
            <section class="td-gallery">
                <img class="td-gallery__img"
                     th:src="|/file/display?fileName=${ticketDetail.uploadPath}/t_${ticketDetail.uuid}_${ticketDetail.fileName}|"
                     th:alt="${ticketDetail.title}">
            </section>

            <nav class="td-nav">
                <button type="button" class="td-nav__item active" data-target="sectionInfo">상세정보</button>
                <button type="button" class="td-nav__item" data-target="sectionMap">위치</button>
                <button type="button" class="td-nav__item" data-target="sectionQna">문의 (<span
                        th:text="${ticketDetail.inquiryCount}"></span>)
                </button>
            </nav>

            <section class="td-section" id="sectionInfo">
                <div class="td-header">
                    <div class="td-header__badges">
                        <span class="td-badge" th:text="${ticketDetail.ticketCategory.displayName}">카테고리</span>
                        <span class="td-badge td-badge--outline" th:text="${ticketDetail.ticketRatingType.displayName}">관람연령</span>
                    </div>
                    <h1 class="td-header__title" th:text="${ticketDetail.title}">티켓팅 제목</h1>
                    <p class="td-header__address"><i class="fa-solid fa-location-dot"></i> <span
                            th:text="${ticketDetail.ticketEventAddress.address} + ' ' + ${ticketDetail.ticketEventAddress.addressDetail}"></span>
                    </p>
                </div>

                <div class="td-content" th:utext="${ticketDetail.content}">
                    상세 내용
                </div>
            </section>

            <section class="td-section" id="sectionMap">
                <h2 class="td-section__title">장소 위치</h2>
                <div class="td-map" id="map"></div>
                <p class="td-map__desc"
                   th:text="${ticketDetail.ticketEventAddress.address} + ' ' + ${ticketDetail.ticketEventAddress.addressDetail}"></p>
            </section>

            <section class="td-section" id="sectionQna">
                <div class="td-section__header">
                    <h2 class="td-section__title">문의 (<span id="inquiryCountText"
                                                            th:text="${ticketDetail.inquiryCount}"></span>)</h2>
                    <button type="button" class="td-btn td-btn--outline" id="inquiryOpenBtn">문의 작성</button>
                </div>
                <div class="td-qna" id="inquiryList">
                </div>
            </section>
        </div>

        <aside class="td-sidebar">
            <div class="td-sidebar__box">
                <div class="td-sidebar__top">
                    <button type="button" class="td-like-btn" id="likeBtn" th:data-status="${ticketDetail.isLiked}">
                        <i class="fa-heart"
                           th:classappend="${ticketDetail.isLiked ? 'fa-solid td-like-btn--active' : 'fa-regular'}"></i>
                    </button>
                    <span class="td-like-count" id="likeCount" th:text="${ticketDetail.likeCount}">0</span>
                </div>

                <div class="td-reserve">
                    <h3 class="td-reserve__title">날짜 선택</h3>
                    <div class="td-reserve__calendar" id="datePickerWrapper">
                        <input type="hidden" id="selectedDate">
                    </div>

                    <div class="td-reserve__grades" id="gradeContainer" style="display: none;">
                        <h4 class="td-reserve__subtitle">등급 및 인원 선택</h4>
                        <div id="gradeList">
                        </div>
                    </div>

                    <div class="td-reserve__total">
                        <span>총 결제 금액</span>
                        <strong id="totalPriceText">0원</strong>
                    </div>

                    <button type="button" class="td-btn td-btn--primary td-btn--full" id="purchaseBtn" disabled>구매하기
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <div class="td-modal" id="inquiryModal">
        <div class="td-modal__box">
            <button class="td-modal__close" id="inquiryCloseBtn" type="button"><i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="td-modal__title">호스트에게 문의하기</h3>
            <input type="text" class="td-modal__input" id="inquiryTitle" placeholder="문의 제목">
            <div style="position:relative; margin-bottom: 24px;">
                <textarea class="td-modal__textarea" id="inquiryContent" rows="6" placeholder="문의 내용"></textarea>
                <div class="td-modal__counter"><span id="inquiryLength">0</span>/200자</div>
            </div>
            <button class="td-btn td-btn--primary td-btn--full" id="inquirySubmitBtn" type="button" disabled>등록하기
            </button>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script type="text/javascript"
            th:src="|//dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoJsKey}&libraries=services&autoload=false|"></script>
    <script type="module" th:src="@{/dist/js/ticket/detail.min.js}"></script>
</th:block>
</html>
