<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title layout:fragment="title">Spotick | 티켓팅 리스트</title>
    <link rel="stylesheet" th:href="@{/dist/css/ticket/list.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/global/district-filter.min.css}">
</head>

<div layout:fragment="content">
    <main class="tk-list-page">
        <nav class="tk-cat">
            <div class="tk-cat__item tk-cat__item--active" data-category="ALL">전체</div>
            <div class="tk-cat__item" th:each="category : ${T(com.app.spotick.domain.type.ticket.TicketCategory).values()}"
                 th:data-category="${category.name()}" th:text="${category.displayName}"></div>
        </nav>

        <section class="tk-toolbar">
            <div class="tk-search">
                <i class="fa-solid fa-magnifying-glass tk-search__icon"></i>
                <input id="searchInput" class="tk-search__input" placeholder="검색어를 입력해주세요." type="text">
            </div>

            <div class="tk-controls">
                <div class="tk-drop" id="ratingBox">
                    <button class="tk-drop__btn" type="button">
                        <span class="tk-drop__text">구분 없음</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="tk-drop__list">
                        <button class="tk-drop__item tk-drop__item--active" data-val="no" type="button">구분 없음</button>
                        <button class="tk-drop__item"
                                th:each="rating : ${T(com.app.spotick.domain.type.ticket.TicketRatingType).values()}"
                                th:data-val="${rating.name()}" th:text="${rating.displayName}" type="button"></button>
                    </div>
                </div>

                <div class="tk-drop" id="sortBox">
                    <button class="tk-drop__btn" type="button">
                        <span class="tk-drop__text">인기순</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="tk-drop__list">
                        <button class="tk-drop__item" th:classappend="${iterStat.index == 0} ? 'tk-drop__item--active' : ''"
                                th:each="sortType, iterStat : ${T(com.app.spotick.global.util.type.TicketSortType).values()}"
                                th:data-val="${sortType.name()}" th:text="${sortType.displayName}" type="button"></button>
                    </div>
                </div>

                <button class="tk-filter-btn" id="filterOpenBtn" type="button">
                    <i class="fa-solid fa-sliders"></i> 지역
                </button>
            </div>
        </section>

        <section class="tk-grid" id="ticketGrid"></section>

        <div class="tk-list-loading" id="loadingSpinner">
            <img alt="로딩" src="/imgs/loading.svg">
        </div>

        <div id="scrollTarget" style="height: 10px; width: 100%;"></div>

        <div th:replace="~{fragments/district-filter :: filter-modal}"></div>
    </main>
</div>

<th:block layout:fragment="script">
    <script th:src="@{/dist/js/ticket/list.min.js}" type="module"></script>
</th:block>
</html>
