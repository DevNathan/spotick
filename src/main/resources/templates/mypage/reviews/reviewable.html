<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/layout}"
      th:with="currentPage='reviews'">

<head>
    <title layout:fragment="title">Spotick | 후기 관리</title>
    <th:block layout:fragment="mypage-css">
        <link rel="stylesheet" th:href="@{/dist/css/mypage/reviews.min.css}">
    </th:block>
</head>

<body>
<div layout:fragment="mypage-content">
    <div class="rv-header">
        <h2 class="rv-header__title">작성 가능한 후기</h2>
    </div>

    <div class="rv-list">
        <div class="rv-empty" th:if="${#lists.isEmpty(notReviewedList.content)}" style="text-align: center; padding: 40px 0; color: #8a8a8e; font-weight: 600;">
            작성 가능한 후기가 없습니다.
        </div>

        <article class="rv-card" th:each="item : ${notReviewedList.content}">
            <div class="rv-card__img-box">
                <img th:if="${not #lists.isEmpty(item.placeFiles)}"
                     th:src="|/file/display?fileName=${item.placeFiles[0].uploadPath}/t_${item.placeFiles[0].uuid}_${item.placeFiles[0].fileName}|"
                     th:alt="${item.title}" class="rv-card__img">
                <div th:unless="${not #lists.isEmpty(item.placeFiles)}" class="rv-card__no-img">No Image</div>
            </div>

            <div class="rv-card__info">
                <div class="rv-card__header-top">
                    <h3 class="rv-card__title" th:text="${item.title}">장소명</h3>
                    <button type="button" class="rv-card__bookmark-btn ItemBookMarkBtn"
                            th:data-id="${item.id}"
                            th:data-status="${item.isBookmarkChecked}">
                        <i class="fa-regular fa-bookmark off" th:classappend="${item.isBookmarkChecked ? 'none' : ''}"></i>
                        <i class="fa-solid fa-bookmark on" th:classappend="${item.isBookmarkChecked ? '' : 'none'}"></i>
                    </button>
                </div>

                <p class="rv-card__address" th:text="${item.placeAddress.address} + ' ' + ${item.placeAddress.addressDetail}">주소</p>

                <div class="rv-card__stats">
                    <span class="rv-card__star"><i class="fa-solid fa-star"></i> <span th:text="${item.evalAvg}">0.0</span>(<span th:text="${item.evalCount}">0</span>)</span>
                    <span class="rv-card__visitors"><i class="fa-solid fa-user-group"></i> 총 <span th:text="${item.visitors}">0</span>명 방문</span>
                </div>

                <p class="rv-card__date">
                    <i class="fa-regular fa-calendar"></i>
                    <span th:text="${#temporals.format(item.checkIn, 'yyyy.MM.dd HH:mm')} + ' ~ ' + ${#temporals.format(item.checkOut, 'yyyy.MM.dd HH:mm')}"></span>
                </p>
                <p class="rv-card__price"><strong th:text="${#numbers.formatInteger(item.price, 3, 'COMMA')}">0</strong>원</p>
            </div>

            <div class="rv-card__actions">
                <button type="button" class="rv-btn rv-btn--primary action-write"
                        th:data-id="${item.reservationId}">
                    후기 작성
                </button>
                <button type="button" class="rv-btn rv-btn--danger action-delete"
                        th:data-id="${item.reservationId}">
                    작성 안함
                </button>
            </div>
        </article>
    </div>

    <section id="paginationContainer"></section>

    <div class="rv-modal-overlay" id="reviewModal">
        <div class="rv-modal">
            <button class="rv-modal__close" id="reviewModalClose" type="button"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="rv-modal__title">후기 작성</h3>

            <div class="rv-modal__content">
                <div class="rv-modal__stars" id="starContainer">
                    <i class="fa-solid fa-star rv-star" data-score="1"></i>
                    <i class="fa-solid fa-star rv-star" data-score="2"></i>
                    <i class="fa-solid fa-star rv-star" data-score="3"></i>
                    <i class="fa-solid fa-star rv-star" data-score="4"></i>
                    <i class="fa-solid fa-star rv-star" data-score="5"></i>
                </div>
                <input type="hidden" id="reviewScore" value="0">

                <div class="rv-modal__textarea-box">
                    <textarea class="rv-modal__textarea" id="reviewContent" rows="6" placeholder="후기 내용을 작성해주세요 (최대 200자)"></textarea>
                    <div class="rv-modal__counter"><span id="reviewLength">0</span>/200자</div>
                </div>

                <button class="rv-btn rv-btn--submit" id="reviewSubmitBtn" type="button">등록하기</button>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="mypage-script">
    <script type="module" th:src="@{/dist/js/mypage/reviews.min.js}"></script>
</th:block>
</body>
</html>
