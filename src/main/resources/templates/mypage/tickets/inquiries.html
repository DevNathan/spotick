<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/layout}"
      th:with="currentPage='tickets'">
<head>
    <title layout:fragment="title">Spotick | 티켓 문의 관리</title>
    <th:block layout:fragment="mypage-css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link rel="stylesheet" th:href="@{/dist/css/mypage/ti-inquiries.min.css}">
    </th:block>
</head>
<body>
<div layout:fragment="mypage-content">
    <input type="hidden" id="ticketId" th:value="${ticketInfo.ticketId}">
    <input type="hidden" id="startDate" th:value="${ticketInfo.startDate}">
    <input type="hidden" id="endDate" th:value="${ticketInfo.endDate}">

    <div class="ti-header">
        <h2 class="ti-header__title">티켓 문의 관리</h2>
        <a th:href="@{/mypage/tickets}" class="ti-header__back"><i class="fa-solid fa-arrow-left"></i> 목록으로 돌아가기</a>
    </div>

    <div class="ti-container">
        <main class="ti-main">
            <h3 class="ti-section-title">들어온 문의</h3>
            <div class="ti-list" id="inquiryList">
            </div>
            <div class="ti-loading" id="loadingSpinner" style="display: none;">
                <img src="/imgs/loading.svg" alt="로딩 중">
            </div>
            <div id="scrollTarget" style="height: 10px; width: 100%;"></div>
        </main>

        <aside class="ti-sidebar">
            <div class="ti-sales-box">
                <h3 class="ti-section-title">티켓 판매 현황</h3>
                <div class="ti-calendar-wrap">
                    <input type="hidden" id="selectedDate">
                    <div id="salesDatePicker"></div>
                </div>
                <div class="ti-grade-container">
                    <table class="ti-grade-table">
                        <thead>
                        <tr>
                            <th>등급</th>
                            <th>가격</th>
                            <th>판매수</th>
                            <th>총 좌석</th>
                        </tr>
                        </thead>
                        <tbody id="gradeList">
                        </tbody>
                    </table>
                </div>
            </div>
        </aside>
    </div>

    <div class="ti-modal-overlay" id="replyModal">
        <div class="ti-modal">
            <button class="ti-modal__close" id="replyModalClose" type="button"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="ti-modal__title">문의 답변하기</h3>
            <input type="hidden" id="targetInquiryId">
            <div class="ti-modal__textarea-box">
                <textarea class="ti-modal__textarea" id="replyContent" rows="6" placeholder="답변 내용을 작성해주세요 (최대 200자)"></textarea>
                <div class="ti-modal__counter"><span id="replyLength">0</span>/200자</div>
            </div>
            <button class="ti-btn ti-btn--submit" id="replySubmitBtn" type="button" disabled>답변 등록</button>
        </div>
    </div>
</div>

<th:block layout:fragment="mypage-script">
    <script type="module" th:src="@{/dist/js/mypage/ti-inquiries.min.js}"></script>
</th:block>
</body>
</html>
