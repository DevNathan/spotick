<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/layout}">
<head>
    <title layout:fragment="title">Spotick | 장소 관리</title>
    <link rel="stylesheet" th:href="@{/dist/css/mypage/places.min.css}">
</head>

<div layout:fragment="mypage-content">
    <header class="manage-header">
        <h2 class="manage-title">장소 관리</h2>
        <div class="place-sort" id="sortTypeBox">
            <button class="place-sort__btn" type="button">
                <span class="place-sort__text" th:text="${sort != null ? sort.displayName : '예약 많은 순'}">예약 많은 순</span>
                <img alt="정렬" class="place-sort__icon" th:src="@{/imgs/arrow_down_gray014.f502da9d.svg}">
            </button>
            <div class="place-sort__list">
                <button class="place-sort__item"
                        th:each="sortTypeItem : ${T(com.app.spotick.global.util.type.PlaceManagerSortType).values()}"
                        th:data-sort="${sortTypeItem.name()}"
                        th:text="${sortTypeItem.displayName}"
                        th:classappend="${sort != null and sortTypeItem.name() == sort.name()} ? 'place-sort__item--active' : ''"
                        type="button"></button>
            </div>
        </div>
    </header>

    <div class="manage-grid" id="manageGrid">
        <th:block th:if="${hostPlacesPage.getTotalElements() > 0}">
            <article class="manage-card" th:each="place : ${hostPlacesPage}" th:data-id="${place.id}">
                <div class="manage-card__slider-wrap">
                    <div class="manage-card__slider">
                        <div class="manage-card__slide" th:each="file : ${place.placeFiles}">
                            <img class="manage-card__img"
                                 th:src="@{/file/display(fileName=${file.uploadPath + '/t_' + file.uuid + '_' + file.fileName})}"
                                 th:alt="${place.title}">
                        </div>
                    </div>
                    <button class="manage-card__nav manage-card__nav--prev"><i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button class="manage-card__nav manage-card__nav--next"><i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <div class="manage-card__pagination">
                        <span class="curr-idx">1</span> / <span th:text="${#lists.size(place.placeFiles)}">1</span>
                    </div>
                </div>

                <div class="manage-card__info">
                    <div class="manage-card__meta">
                        <span class="manage-card__address" th:text="${place.placeAddress.address}">주소</span>
                        <div class="manage-card__stats">
                            <span class="manage-card__stat"><i class="fa-solid fa-star manage-card__stat-icon"></i>
                                <th:block th:text="${place.evalAvg}"></th:block> (<th:block
                                        th:text="${place.evalCount}"></th:block>)
                            </span>
                            <span class="manage-card__stat"><i class="fa-solid fa-bookmark" style="color: #8a8a8e;"></i> <th:block
                                    th:text="${place.bookmarkCount}"></th:block></span>
                        </div>
                    </div>

                    <h3 class="manage-card__title" th:text="${place.title}">장소명</h3>

                    <div class="manage-card__status-row">
                        <div class="manage-card__price">
                            <th:block th:text="${#numbers.formatInteger(place.price, 1, 'COMMA')}"></th:block>
                            원
                            <span style="font-size: 12px; font-weight: 500; color: #8a8a8e;">/ 시간</span>
                        </div>
                        <span class="manage-card__badge"
                              th:classappend="'manage-card__badge--' + ${place.postStatus.name().toLowerCase()}"
                              th:text="${place.postStatus.displayName}">상태</span>
                    </div>

                    <div class="manage-card__actions">
                        <div class="manage-card__btn-group">
                            <a th:href="@{/mypage/places/reservations/{placeId}(placeId=${place.id})}"
                               class="manage-action-btn">
                                예약 관리 <span class="manage-action-badge" th:if="${place.reservationRequestCount > 0}"
                                            th:text="${place.reservationRequestCount}"></span>
                            </a>
                            <a th:href="@{/mypage/places/inquiries/{placeId}(placeId=${place.id})}"
                               class="manage-action-btn">
                                문의 관리 <span class="manage-action-badge" th:if="${place.inquiriesCount > 0}"
                                            th:text="${place.inquiriesCount}"></span>
                            </a>
                        </div>

                        <div class="manage-dropdown-wrap">
                            <button class="manage-more-btn" type="button"><i class="fa-solid fa-ellipsis"></i></button>
                            <div class="manage-dropdown">
                                <button class="manage-dropdown__item action-disable"
                                        th:if="${place.postStatus.name() == 'APPROVED'}" type="button">장소 대여 중지
                                </button>
                                <button class="manage-dropdown__item action-enable"
                                        th:if="${place.postStatus.name() == 'DISABLED'}" type="button">장소 대여 재개
                                </button>
                                <button class="manage-dropdown__item action-edit"
                                        th:if="${place.postStatus.name() == 'APPROVED' or place.postStatus.name() == 'DISABLED'}"
                                        type="button">장소 정보 수정
                                </button>
                                <button class="manage-dropdown__item action-delete" type="button"
                                        style="color: #ff3b30;">장소 삭제
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </th:block>

        <th:block th:if="${hostPlacesPage.getTotalElements() == 0}">
            <div class="manage-empty">
                <i class="fa-solid fa-building-circle-xmark" style="font-size: 48px;"></i>
                <p>등록된 장소 정보가 없습니다.</p>
            </div>
        </th:block>
    </div>

    <section class="pagination-container" th:if="${hostPlacesPage.getTotalElements() > 0}">
        <th:block th:if="${pagination.hasPrevBlock()}">
            <a class="pagination-btns" th:href="@{/mypage/places(page=1, sort=${sort})}" title="맨 처음">
                <i class="fa-solid fa-angles-left"></i>
            </a>
            <a class="pagination-btns" th:href="@{/mypage/places(page=${pagination.startPage - 1}, sort=${sort})}"
               title="이전">
                <i class="fa-solid fa-angle-left"></i>
            </a>
        </th:block>

        <th:block th:each="i : ${#numbers.sequence(pagination.startPage, pagination.endPage)}">
            <a class="pagination-btns"
               th:classappend="${i == pagination.currentPage ? 'active' : ''}"
               th:href="@{/mypage/places(page=${i}, sort=${sort})}"
               th:text="${i}"></a>
        </th:block>

        <th:block th:if="${pagination.hasNextBlock()}">
            <a class="pagination-btns" th:href="@{/mypage/places(page=${pagination.endPage + 1}, sort=${sort})}"
               title="다음">
                <i class="fa-solid fa-angle-right"></i>
            </a>
            <a class="pagination-btns" th:href="@{/mypage/places(page=${pagination.lastPage}, sort=${sort})}"
               title="맨 끝">
                <i class="fa-solid fa-angles-right"></i>
            </a>
        </th:block>
    </section>
</div>

<th:block layout:fragment="mypage-script">
    <input type="hidden" id="currentPage" th:value="${pagination.currentPage}">
    <script th:src="@{/dist/js/mypage/places.min.js}" type="module"></script>
</th:block>
</html>
