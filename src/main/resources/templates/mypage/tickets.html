<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mypage/layout}"
      th:with="currentPage='tickets'">
<head>
    <title layout:fragment="title">Spotick | 티켓팅 관리</title>
    <th:block layout:fragment="mypage-css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link rel="stylesheet" th:href="@{/dist/css/mypage/tickets.min.css}">
    </th:block>
</head>
<body>
<div layout:fragment="mypage-content">
    <div class="tm-header">
        <h2 class="tm-header__title">티켓팅 관리</h2>
    </div>

    <nav class="tm-nav">
        <a class="tm-nav__btn" th:classappend="${viewType == 'all'} ? 'tm-nav__btn--active' : ''"
           th:href="@{/mypage/tickets(page=1, view='all')}">
            전체(<span th:text="${ticketPage.total}"></span>)
        </a>
        <a class="tm-nav__btn" th:classappend="${viewType == 'upcoming'} ? 'tm-nav__btn--active' : ''"
           th:href="@{/mypage/tickets(page=1, view='upcoming')}">
            예정된 티켓팅(<span th:text="${ticketPage.upcomingCount}"></span>)
        </a>
        <a class="tm-nav__btn" th:classappend="${viewType == 'past'} ? 'tm-nav__btn--active' : ''"
           th:href="@{/mypage/tickets(page=1, view='past')}">
            종료된 티켓팅(<span th:text="${ticketPage.pastCount}"></span>)
        </a>
    </nav>

    <div class="tm-container">
        <main class="tm-main">
            <th:block th:if="${ticketPage.page.totalElements > 0}">
                <div class="tm-list">
                    <article class="tm-card" th:each="hostTicket : ${ticketPage.page}"
                             th:data-id="${hostTicket.ticketId}"
                             th:data-title="${hostTicket.title}"
                             th:data-address="${hostTicket.ticketAddress.address}"
                             th:data-address-detail="${hostTicket.ticketAddress.addressDetail}"
                             th:data-start-date="${hostTicket.startDate}"
                             th:data-end-date="${hostTicket.endDate}">
                        <div class="tm-card__img-box">
                            <img class="tm-card__img" th:alt="${hostTicket.title}"
                                 th:src="|/file/display?fileName=${hostTicket.uploadPath}/t_${hostTicket.uuid}_${hostTicket.fileName}|">
                        </div>
                        <div class="tm-card__info">
                            <h3 class="tm-card__title" th:text="${hostTicket.title}">티켓팅 제목</h3>
                            <p class="tm-card__address" th:text="${hostTicket.ticketAddress.address + ' ' + hostTicket.ticketAddress.addressDetail}">주소</p>

                            <div class="tm-card__bottom">
                                <p class="tm-card__price"><strong th:text="${#numbers.formatInteger(hostTicket.minPrice, 3, 'COMMA')}">0</strong>원 부터~</p>
                                <p class="tm-card__date" th:text="${#temporals.format(hostTicket.startDate, 'yyyy.MM.dd')} + ' ~ ' + ${#temporals.format(hostTicket.endDate, 'yyyy.MM.dd')}"></p>
                            </div>

                            <div class="tm-card__actions">
                                <a class="tm-btn tm-btn--inquiry action-ignore" th:href="@{/mypage/tickets/inquiries/{ticketId}(ticketId=${hostTicket.ticketId})}">
                                    문의 관리
                                    <span class="tm-badge" th:if="${hostTicket.inquiriesCount > 0}" th:text="${hostTicket.inquiriesCount}"></span>
                                </a>
                                <a class="tm-btn tm-btn--edit action-ignore" th:href="@{/ticket/edit/{ticketId}(ticketId=${hostTicket.ticketId})}">
                                    정보 수정
                                </a>
                            </div>
                        </div>
                    </article>
                </div>
            </th:block>

            <th:block th:if="${ticketPage.page.totalElements == 0}">
                <div class="tm-empty">등록된 티켓팅 정보가 없습니다.</div>
            </th:block>

            <div id="paginationContainer" th:if="${ticketPage.page.totalElements > 0}"
                 th:data-has-prev="${pagination.hasPrevBlock()}"
                 th:data-has-next="${pagination.hasNextBlock()}"
                 th:data-start-page="${pagination.startPage}"
                 th:data-end-page="${pagination.endPage}"
                 th:data-last-page="${pagination.lastPage}"
                 th:data-current-page="${pagination.currentPage}"
                 th:data-block-size="${pagination.blockSize != null ? pagination.blockSize : 5}"
                 th:data-view-type="${viewType}">
            </div>
        </main>

        <aside class="tm-sidebar">
            <div class="tm-detail" id="detailContainer">
                <div class="tm-detail__empty">선택된 티켓이 없습니다.<br>좌측 리스트에서 선택해주세요.</div>
            </div>
        </aside>
    </div>
</div>

<th:block layout:fragment="mypage-script">
    <script type="module" th:src="@{/dist/js/mypage/tickets.min.js}"></script>
</th:block>
</body>
</html>
