spring:
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local

  # 데이터베이스 연결 설정 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spotick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: placeholder
    password: placeholder

  # JPA 및 하이버네이트 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # P6Spy가 쿼리를 가로채서 출력하므로 하이버네이트 기본 로그는 off
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000 # N+1 문제 방지를 위한 in 쿼리 최적화 사이즈입니다.
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
      password: placeholder

  # 파일 업로드 용량 제한 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # 메일 발송 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: placeholder
    password: placeholder
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # OAuth2 클라이언트 및 프로바이더 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: placeholder
            client-secret: placeholder
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope:
              - profile
              - email
          kakao:
            client-id: placeholder
            client-secret: placeholder
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
          naver:
            client-id: placeholder
            client-secret: placeholder
            authorization-grant-type: authorization_code
            client-name: Naver
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

kakao:
  js: placeholder

# Bootpay 결제 모듈 설정
bootpay:
  restApi: placeholder
  privateKey: placeholder

gpt:
  api: placeholder

# 파일 업로드 경로 설정
default:
  profileFileDir: static/imgs/default/ # src/main/resources 하위의 기본 이미지 경로
root:
  dir: placeholder # 일반 첨부파일이 저장될 리눅스 컨테이너 내부 절대 경로를 입력하십시오.
summernote:
  dir: placeholder # 에디터 본문 이미지가 저장될 절대 경로를 입력하십시오.